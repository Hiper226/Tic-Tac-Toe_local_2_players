<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="login-area">
            <input type="text" id="username-input" placeholder="Enter your username" maxlength="15">
        </div>
        <button id="search-button">Player Search</button>
        <div id="board" style="display: none;">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div id="message"></div>
        <div id="turn-message"></div>
        
        <div id="scoreboard">Wins - <span id="my-name">You</span>: <span id="my-wins">0</span> | <span id="opp-name">Opponent</span>: <span id="opp-wins">0</span></div>
        <button id="restart-button" style="display: none;">Restart Game</button>
    </div>
    <script src="index.js"></script>
</body> 
</html>
